# Models Configuration
# Available models for each feature
# Use the actual adapter model IDs as defined in the adapter classes
#
# COMMERCIAL USE (hard prerequisite for Open3DStudio):
#   See docs/MODEL_LICENSES.md before enabling any route.
#   Routes disabled below are NON-COMMERCIAL upstream licenses (NVIDIA / S-Lab / Bria).

# text-conditioned geometry/geometry+texture generation
text_to_textured_mesh:
  trellis_text_to_textured_mesh:
    vram_requirement: 11776  # MB
    supported_inputs: ["text"]
    supported_outputs: ["glb", "obj"]
    model_path: "thirdparty/TRELLIS"
    enabled: true
    max_workers: 1

# text-conditioned mesh painting
text_mesh_painting:
  trellis_text_mesh_painting:
    vram_requirement: 11776  # MB
    supported_inputs: ["mesh", "text"]
    supported_outputs: ["glb", "obj"]
    model_path: "thirdparty/TRELLIS"
    enabled: true
    max_workers: 1

# image-conditioned geometry generation
image_to_raw_mesh:    
  hunyuan3dv21_image_to_raw_mesh:
    vram_requirement: 8192  # MB
    supported_inputs: ["image"]
    supported_outputs: ["glb", "obj"]
    model_path: "pretrained/tencent/Hunyuan3D-2.1"
    enabled: true
    max_workers: 1
    
  partpacker_image_to_raw_mesh:
    vram_requirement: 10240  # MB
    supported_inputs: ["image"]
    supported_outputs: ["glb", "obj"]
    model_path: "thirdparty/PartPacker"
    enabled: false  # LICENSE: NVIDIA non-commercial research only — see docs/MODEL_LICENSES.md
    max_workers: 1
  
  ultrashape_image_to_raw_mesh:
    vram_requirement: 26640  # MB (20GB: 8GB Hunyuan + 12GB UltraShape)
    supported_inputs: ["image"]
    supported_outputs: ["glb", "obj", "ply"]
    model_path: "thirdparty/UltraShape"
    enabled: true
    max_workers: 1

# image-conditioned geometry+texture generation
image_to_textured_mesh:
  trellis_image_to_textured_mesh:
    vram_requirement: 11776  # MB
    supported_inputs: ["image"]
    supported_outputs: ["glb", "obj"]
    model_path: "thirdparty/TRELLIS"
    enabled: true
    max_workers: 1

  trellis2_image_to_textured_mesh:
    vram_requirement: 20480  # MB — GB10 UMA often reports ~21GB free; 23.5GB gate blocked jobs
    supported_inputs: ["image"]
    supported_outputs: ["glb", "obj"]
    model_path: "thirdparty/TRELLIS.2"
    enabled: true
    max_workers: 1

  pixal3d_image_to_textured_mesh:
    vram_requirement: 20480  # MB — pixel-aligned PBR; use low_vram on 16GB GPUs
    supported_inputs: ["image"]
    supported_outputs: ["glb"]
    model_path: "thirdparty/Pixal3D"
    enabled: true
    max_workers: 1
    init_params:
      default_low_vram: true

  hunyuan3dv21_image_to_textured_mesh:
    vram_requirement: 19456  # MB
    supported_inputs: ["image"]
    supported_outputs: ["glb", "obj"]
    model_path: "pretrained/tencent/Hunyuan3D-2.1"
    enabled: true
    max_workers: 1

# image-conditioned mesh painting
image_mesh_painting:
  trellis_image_mesh_painting:
    vram_requirement: 11776  # MB
    supported_inputs: ["mesh", "image"]
    supported_outputs: ["glb", "obj"]
    model_path: "thirdparty/TRELLIS"
    enabled: true
    max_workers: 1

  trellis2_image_mesh_painting:
    vram_requirement: 23552   # MB (23GB, TRELLIS.2)
    supported_inputs: ["mesh", "image"]
    supported_outputs: ["glb", "obj"]
    model_path: "thirdparty/TRELLIS.2"
    enabled: true
    max_workers: 1

  hunyuan3dv21_image_mesh_painting:
    vram_requirement: 12288  # MB
    supported_inputs: ["mesh", "text", "image"]
    supported_outputs: ["glb", "obj"]
    model_path: "pretrained/tencent/Hunyuan3D-2.1"
    enabled: true
    max_workers: 1

# image → explorable world package (splat environment + optional mesh props)
image_to_world:
  opennexus_image_to_world:
    vram_requirement: 20480  # MB (TripoSplat + optional TRELLIS.2 props sequential)
    supported_inputs: ["image"]
    supported_outputs: ["json", "ply", "glb"]
    model_path: "outputs/worlds"
    enabled: true
    max_workers: 1

# image-conditioned Gaussian splat generation (Spark.js / WebXR)
image_to_splat:
  triposplat_image_to_splat:
    vram_requirement: 16384  # MB
    supported_inputs: ["image"]
    supported_outputs: ["ply", "splat"]
    model_path: "thirdparty/TripoSplat"
    enabled: true
    max_workers: 1
  colmap_3dgs_reconstruct:
    vram_requirement: 8192  # MB — COLMAP CPU + PLY export; optional gsplat refine later
    supported_inputs: ["image"]
    supported_outputs: ["ply", "splat"]
    model_path: "outputs/splats"
    enabled: true
    max_workers: 1
  worldmirror2_reconstruct:
    vram_requirement: 16384  # MB — WorldMirror 2.0 feed-forward 3DGS
    supported_inputs: ["image"]
    supported_outputs: ["ply", "splat"]
    model_path: "thirdparty/HY-World-2.0"
    enabled: true
    max_workers: 1

# mesh segmentation
mesh_segmentation:
  partfield_mesh_segmentation:
    vram_requirement: 4096  # MB
    supported_inputs: ["glb", "obj"]
    supported_outputs: ["glb"]
    model_path: "thirdparty/PartField"
    enabled: false  # LICENSE: NVIDIA non-commercial only — see docs/MODEL_LICENSES.md
    max_workers: 1
  
  p3sam_mesh_segmentation:
    vram_requirement: 61440  # MB (60GB, P3-SAM)
    supported_inputs: ["glb", "obj", "ply"]
    supported_outputs: ["glb"]
    model_path: "pretrained/P3-SAM/p3sam.safetensors"
    enabled: true
    max_workers: 1

auto_rig:
  unirig_auto_rig:
    vram_requirement: 9216  # MB
    supported_inputs: ["obj", "glb", "fbx"]
    supported_outputs: ["glb", "fbx"]
    model_path: "thirdparty/UniRig"
    enabled: true
    max_workers: 1

  skintokens_auto_rig:
    vram_requirement: 15360  # MB (>=14GB recommended by upstream)
    supported_inputs: ["obj", "glb", "gltf", "ply", "stl", "fbx"]
    supported_outputs: ["glb"]
    model_path: "thirdparty/SkinTokens"
    enabled: true
    max_workers: 1
    init_params:
      auto_download_checkpoints: true

# mesh retopology
mesh_retopology:
  fastmesh_v1k_retopology:
    vram_requirement: 16384  # MB
    supported_inputs: ["obj", "glb", "ply", "stl"]
    supported_outputs: ["obj", "glb", "ply"]
    model_path: "pretrained/FastMesh-V1K"
    enabled: false  # LICENSE: S-Lab / FastMesh non-commercial only — see docs/MODEL_LICENSES.md
    max_workers: 1
    
  fastmesh_v4k_retopology:
    vram_requirement: 24500  # MB
    supported_inputs: ["obj", "glb", "ply", "stl"]
    supported_outputs: ["obj", "glb", "ply"]
    model_path: "pretrained/FastMesh-V4K"
    enabled: false  # LICENSE: S-Lab / FastMesh non-commercial only — see docs/MODEL_LICENSES.md
    max_workers: 1

  instant_meshes_retopology:
    vram_requirement: 512  # MB (CPU CLI; no GPU weights)
    supported_inputs: ["obj", "glb", "ply", "stl"]
    supported_outputs: ["obj", "glb", "ply"]
    model_path: "thirdparty/instant-meshes/build/Instant Meshes"
    enabled: true
    max_workers: 1

# UV unwrapping
uv_unwrapping:
  partuv_uv_unwrapping:
    vram_requirement: 7168  # MB
    supported_inputs: ["obj", "glb"]
    supported_outputs: ["obj"]
    model_path: "pretrained/PartField/model_objaverse.ckpt"
    enabled: false  # LICENSE: uses PartField weights (NVIDIA non-commercial) — see docs/MODEL_LICENSES.md
    max_workers: 1

  xatlas_uv_unwrapping:
    vram_requirement: 512  # MB (CPU; pip package xatlas)
    supported_inputs: ["obj", "glb", "ply", "stl"]
    supported_outputs: ["obj", "glb"]
    model_path: "pip:xatlas"
    enabled: true
    max_workers: 1

# Mesh editing (local editing with VoxHammer)
text_mesh_editing:
  voxhammer_text_mesh_editing:
    vram_requirement: 40960  # MB (40GB: TRELLIS + rendering)
    supported_inputs: ["mesh", "text"]
    supported_outputs: ["glb"]
    model_path: "thirdparty/VoxHammer"
    enabled: true
    max_workers: 1

image_mesh_editing:
  voxhammer_image_mesh_editing:
    vram_requirement: 40960  # MB (40GB: TRELLIS + rendering)
    supported_inputs: ["mesh", "image"]
    supported_outputs: ["glb"]
    model_path: "thirdparty/VoxHammer"
    enabled: true
    max_workers: 1

# Text-to-motion (Kimodo SOMA → studio_motion.json for uploaded VRM in OpenNexus3DStudio)
text_to_motion:
  kimodo_text_to_motion:
    vram_requirement: 8192  # MB — use TEXT_ENCODER_DEVICE=cpu if VRAM tight (~17GB full GPU)
    supported_inputs: ["text"]
    supported_outputs: ["studio_motion", "npz", "bvh"]
    model_path: "thirdparty/kimodo"
    enabled: true
    max_workers: 1
    worker_load_timeout_sec: 3600  # first cold start loads Llama-3-8B (~16GB)
    license_note: "Ship Kimodo-SOMA-RP-v1.1 only (NVIDIA Open Model — CONDITIONAL). Kimodo-SMPLX-RP-v1 is BLOCKED (R&D license). See docs/MODEL_LICENSES.md."
    init_params:
      hf_model_id: "Kimodo-SOMA-RP-v1.1"
